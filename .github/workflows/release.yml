name: Publish

on:
  release:
    types: created

jobs:
  publish-crate:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  publish-npm:
    needs: publish-crate
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write   # npm provenance
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 22 ships an older
      # CLI. Pin the version so release behavior stays deterministic.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11.5.1

      - name: Install deps
        working-directory: npm
        run: npm ci

      # Cargo.toml is the single source of truth for the version. release-plz
      # bumps it but does not know about npm/package.json, so sync it here to
      # keep the crate and the npm package on the same version every release.
      - name: Sync npm version to crate
        working-directory: npm
        run: |
          CRATE_VERSION=$(grep '^version' ../Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          node -e "const fs=require('fs');const p=require('./package.json');p.version='${CRATE_VERSION}';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
          echo "npm version synced to ${CRATE_VERSION}"

      # prepublishOnly builds the ESM + CJS + dts bundle and embeds the data.
      - name: Publish to npm
        working-directory: npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PKG=$(node -p "require('./package.json').name")
          if npm view "${PKG}@${VERSION}" version >/dev/null 2>&1; then
            echo "Version ${VERSION} already published to npm; skipping."
            exit 0
          fi
          npm publish --provenance --access public
