name: Update PSL Data

# Daily PSL data refresh, released INDEPENDENTLY of code changes.
#
# A data release is cut from the LAST RELEASE TAG, not from main's HEAD, so it
# can never sweep in unreleased code sitting on main. The data commit is then
# synced onto main; release-plz re-computes the pending code release to stack on
# top of the new data release. So data and code stay on separate version steps
# (e.g. 0.0.8 = data only, 0.0.9 = the code that was pending).
#
# No cancel-in-progress — a run that already tagged/pushed must not be killed.
concurrency:
  group: update-psl

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token (SW Release Bot)
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0  # full history + tags needed to branch off the last release
          # Do not persist the write-capable app token in .git/config: the job
          # runs cargo (build scripts / proc-macros from dependencies) before any
          # push, and a malicious one could read a persisted credential. Auth is
          # re-attached to origin only inside the push steps, after cargo runs.
          persist-credentials: false

      - name: Download fresh PSL
        run: curl -fsSL https://publicsuffix.org/list/public_suffix_list.dat -o /tmp/psl-fresh.dat

      - name: Resolve last release tag
        id: base
        run: |
          # Highest semver tag (vX.Y.Z) is the baseline a data release is cut from.
          TAG=$(git tag --list 'v*' --sort=-version:refname | head -1)
          if [ -z "$TAG" ]; then
            echo "No release tag found; cannot cut a data release." >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Baseline tag: $TAG"

      - name: Check for rule changes
        id: diff
        run: |
          # Extract and canonicalize rules identically to build-psl.py: strip
          # comments/blanks, drop leading dot, lowercase — so case-only or
          # dot-only upstream edits don't trigger false version bumps. The
          # baseline is the data file AT THE LAST RELEASE TAG.
          extract_rules() {
            python3 - "$1" <<'PY' | LC_ALL=C sort -u
          import sys

          with open(sys.argv[1], encoding="utf-8") as f:
              for raw in f:
                  line = raw.strip()
                  if not line or line.startswith("//"):
                      continue
                  print(line.lstrip(".").lower())
          PY
          }

          git show "${{ steps.base.outputs.tag }}:data/public_suffix_list.dat" > /tmp/psl-base.dat
          extract_rules /tmp/psl-base.dat > /tmp/rules-current.txt
          extract_rules /tmp/psl-fresh.dat > /tmp/rules-fresh.txt

          if diff -q /tmp/rules-current.txt /tmp/rules-fresh.txt > /dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            # No new PSL changes since the baseline tag. But if a prior run cut
            # the release tag yet failed before syncing it onto main, the tag is
            # stranded — finish that sync instead of silently no-oping.
            git fetch origin main --quiet
            if git merge-base --is-ancestor "${{ steps.base.outputs.tag }}" origin/main; then
              echo "resync=false" >> "$GITHUB_OUTPUT"
              echo "No rule changes since ${{ steps.base.outputs.tag }}; already on main."
            else
              echo "resync=true" >> "$GITHUB_OUTPUT"
              echo "No rule changes, but ${{ steps.base.outputs.tag }} is not on main — will resync."
            fi
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "resync=false" >> "$GITHUB_OUTPUT"

          # Compute added/removed domains (LC_ALL=C matches sort collation).
          LC_ALL=C comm -13 /tmp/rules-current.txt /tmp/rules-fresh.txt > /tmp/added.txt
          LC_ALL=C comm -23 /tmp/rules-current.txt /tmp/rules-fresh.txt > /tmp/removed.txt
          ADDED=$(wc -l < /tmp/added.txt | tr -d ' ')
          REMOVED=$(wc -l < /tmp/removed.txt | tr -d ' ')
          echo "added=$ADDED" >> "$GITHUB_OUTPUT"
          echo "removed=$REMOVED" >> "$GITHUB_OUTPUT"
          echo "Domain changes: +$ADDED -$REMOVED"

          # Release notes / changelog body: the explicit list of added/removed
          # domains (capped, with an overflow note) — consumers must be able to
          # see exactly which domains changed.
          {
            echo "Automated PSL data refresh from https://publicsuffix.org/list/public_suffix_list.dat"
            echo ""
            echo "Domain changes: +${ADDED} -${REMOVED}"
            if [ "$ADDED" -gt 0 ]; then
              echo ""
              echo "Added (${ADDED}):"
              head -100 /tmp/added.txt | sed 's/^/  + /'
              if [ "$ADDED" -gt 100 ]; then echo "  ... and $((ADDED - 100)) more"; fi
            fi
            if [ "$REMOVED" -gt 0 ]; then
              echo ""
              echo "Removed (${REMOVED}):"
              head -100 /tmp/removed.txt | sed 's/^/  - /'
              if [ "$REMOVED" -gt 100 ]; then echo "  ... and $((REMOVED - 100)) more"; fi
            fi
          } > /tmp/domains.txt

      - uses: dtolnay/rust-toolchain@stable
        if: steps.diff.outputs.changed == 'true'
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        if: steps.diff.outputs.changed == 'true'

      - name: Cut data release off the last tag
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BASE_TAG: ${{ steps.base.outputs.tag }}
          ADDED: ${{ steps.diff.outputs.added }}
          REMOVED: ${{ steps.diff.outputs.removed }}
        run: |
          set -euo pipefail
          git config user.name "sw-release-bot[bot]"
          git config user.email "sw-release-bot[bot]@users.noreply.github.com"

          # Patch-bump from the baseline version (Cargo is the source of truth;
          # npm mirrors it). Read the baseline version straight from the tag so
          # the release branch can be named per-version before checkout.
          VER=$(git show "$BASE_TAG:Cargo.toml" | grep '^version' | head -1 | sed 's/.*"\(.*\)"/\1/')
          NEW="$(echo "$VER" | cut -d. -f1).$(echo "$VER" | cut -d. -f2).$(( $(echo "$VER" | cut -d. -f3) + 1 ))"

          # Version-specific branch: a fixed name collides with the previous
          # cascade's remote branch and is rejected as non-fast-forward on reruns.
          BRANCH="chore/psl-update-v${NEW}"

          # Branch from the LAST RELEASE so the data release carries no
          # unreleased code that may be sitting on main.
          git checkout -B "$BRANCH" "$BASE_TAG"

          cp /tmp/psl-fresh.dat data/public_suffix_list.dat
          python3 scripts/build-psl.py

          # Run the same gate CI enforces before publishing: a data bump must not
          # ship unless clippy passes too, not just the test suite.
          cargo test --all-features
          cargo clippy --all-features -- -D warnings

          sed -i "s/^version = \"$VER\"/version = \"$NEW\"/" Cargo.toml
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('npm/package.json','utf8'));p.version='$NEW';fs.writeFileSync('npm/package.json',JSON.stringify(p,null,2)+'\n')"
          cargo check --all-features  # refresh Cargo.lock

          # Prepend a CHANGELOG entry listing the domain diff.
          TODAY=$(date -u +%Y-%m-%d)
          {
            echo "## [${NEW}](https://github.com/${GITHUB_REPOSITORY}/compare/${BASE_TAG}...v${NEW}) - ${TODAY}"
            echo ""
            echo "### Data"
            echo ""
            echo "PSL data update: +${ADDED} -${REMOVED} domains."
            echo ""
            if [ "$ADDED" -gt 0 ]; then
              echo "<details><summary>Added (${ADDED})</summary>"
              echo ""
              echo '```'
              head -100 /tmp/added.txt
              if [ "$ADDED" -gt 100 ]; then echo "... and $((ADDED - 100)) more"; fi
              echo '```'
              echo ""
              echo "</details>"
              echo ""
            fi
            if [ "$REMOVED" -gt 0 ]; then
              echo "<details><summary>Removed (${REMOVED})</summary>"
              echo ""
              echo '```'
              head -100 /tmp/removed.txt
              if [ "$REMOVED" -gt 100 ]; then echo "... and $((REMOVED - 100)) more"; fi
              echo '```'
              echo ""
              echo "</details>"
              echo ""
            fi
          } > /tmp/changelog-entry.md
          # Insert the entry right after the "## [Unreleased]" marker.
          python3 - "$NEW" <<'PY'
          import sys, pathlib
          new = sys.argv[1]
          cl = pathlib.Path("CHANGELOG.md")
          text = cl.read_text(encoding="utf-8")
          entry = pathlib.Path("/tmp/changelog-entry.md").read_text(encoding="utf-8")
          marker = "## [Unreleased]"
          idx = text.find(marker)
          if idx == -1:
              cl.write_text(entry + "\n" + text, encoding="utf-8")
          else:
              end = text.find("\n", idx) + 1
              cl.write_text(text[:end] + "\n" + entry + text[end:], encoding="utf-8")
          PY

          git add -A
          {
            echo "feat(data): update PSL (+${ADDED} -${REMOVED})"
            echo ""
            cat /tmp/domains.txt
          } > /tmp/commit-msg.txt
          git commit -F /tmp/commit-msg.txt

          # Attach the token to origin now (checkout used persist-credentials:
          # false), after the untrusted cargo steps have already run.
          git remote set-url origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          # Push the TAG first: if a later step fails, the resync path recovers
          # from "tag exists but not on main". The branch push uses
          # --force-with-lease so a rerun is idempotent even if a prior run left
          # the remote branch behind (avoids a permanent non-fast-forward block).
          # The release event triggers publishing.
          git tag "v${NEW}"
          git push origin "v${NEW}"
          git push --force-with-lease -u origin "$BRANCH"
          gh release create "v${NEW}" --title "v${NEW}" --notes-file /tmp/domains.txt

          echo "new_version=$NEW" >> "$GITHUB_ENV"
          # Version to notify downstream about (shared with the resync path).
          echo "dispatch_version=$NEW" >> "$GITHUB_ENV"

      - name: Sync the data release onto main
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          # Bring the released data commit onto main via a MERGE commit (not squash
          # or cherry-pick): the merge keeps the tagged commit as an ancestor of
          # main, so release-plz recognises the data version as released and the
          # next code release's changelog lists only the code — not the data again.
          BRANCH="chore/psl-update-v${{ env.new_version }}"
          gh pr create --base main --head "$BRANCH" \
            --title "feat(data): update PSL (+${{ steps.diff.outputs.added }} -${{ steps.diff.outputs.removed }})" \
            --body "Sync of released data v${{ env.new_version }} onto main."
          gh pr merge --auto --merge "$BRANCH"

      - name: Resync stranded release tag onto main
        if: steps.diff.outputs.resync == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BASE_TAG: ${{ steps.base.outputs.tag }}
        run: |
          set -euo pipefail
          # A prior run tagged this release but failed before the main sync,
          # leaving the tag off main and breaking release-plz stacking. Open the
          # sync PR for the existing tag. If the prior run also failed at
          # `gh release create`, the release object (and crates.io publish) is
          # missing — recreate it so the tag actually publishes. The downstream
          # dispatch then runs from the shared step below (it also covers resync).
          BRANCH="chore/psl-resync-${BASE_TAG}"
          # Re-attach the token to origin (checkout used persist-credentials: false).
          git remote set-url origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin --force "${BASE_TAG}:refs/heads/${BRANCH}"
          gh release view "$BASE_TAG" >/dev/null 2>&1 || \
            gh release create "$BASE_TAG" --title "$BASE_TAG" \
              --notes "PSL data release ${BASE_TAG} (resynced)."
          gh pr create --base main --head "$BRANCH" \
            --title "chore(data): sync released ${BASE_TAG} onto main" \
            --body "Re-sync of released data ${BASE_TAG} that did not reach main in a prior run." \
            || true
          gh pr merge --auto --merge "$BRANCH"

          # Notify downstream for this recovered release too — a prior run may
          # have failed before dispatching. Same crates.io-gated dispatch as the
          # changed path; version is the tag without its leading "v".
          echo "dispatch_version=${BASE_TAG#v}" >> "$GITHUB_ENV"

      # Notify downstream consumers that embed the PSL via this crate so they can
      # rebuild + republish against the fresh data (off their own last release,
      # not touching their unreleased code). Token is scoped to the downstream
      # repo (SW Release Bot must be installed there).
      - name: Generate downstream token
        id: downstream-token
        if: steps.diff.outputs.changed == 'true' || steps.diff.outputs.resync == 'true'
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: structured-email-address

      - name: Trigger downstream rebuild (structured-email-address)
        if: steps.diff.outputs.changed == 'true' || steps.diff.outputs.resync == 'true'
        env:
          GH_TOKEN: ${{ steps.downstream-token.outputs.token }}
        run: |
          set -euo pipefail
          # The data release publishes asynchronously (release.yml, on the GitHub
          # release created above). The downstream bumps its dependency on the
          # PUBLISHED crate — not on this repo's main — so wait until the new
          # version is live on crates.io before dispatching, so the downstream can
          # bump immediately. (The sync-merge onto main is irrelevant downstream.)
          # Runs for both a fresh data release and a resync of a stranded release,
          # so a partial prior run can never leave the downstream un-notified.
          ver="${{ env.dispatch_version }}"
          for i in $(seq 1 30); do
            if curl -fsS "https://index.crates.io/st/ru/structured-public-domains" \
                 | grep -q "\"vers\":\"${ver}\""; then
              echo "structured-public-domains v${ver} is live on crates.io"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "timed out waiting for v${ver} on crates.io" >&2
              exit 1
            fi
            echo "waiting for v${ver} on crates.io (attempt ${i})..."
            sleep 10
          done
          gh api "repos/${{ github.repository_owner }}/structured-email-address/dispatches" \
            -f event_type=psl-updated \
            -F "client_payload[version]=${ver}" \
            -F "client_payload[crate]=structured-public-domains"
