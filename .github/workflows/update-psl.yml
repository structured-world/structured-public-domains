name: Update PSL Data

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token (SW Release Bot)
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Download fresh PSL
        run: curl -fsSL https://publicsuffix.org/list/public_suffix_list.dat -o /tmp/psl-fresh.dat

      - name: Check for rule changes
        id: diff
        run: |
          # Extract only rules: strip comments, blank lines, sort
          extract_rules() {
            grep -v '^[[:space:]]*//' "$1" | grep -v '^[[:space:]]*$' | sed 's/^[[:space:]]*//' | sort
          }

          extract_rules data/public_suffix_list.dat > /tmp/rules-current.txt
          extract_rules /tmp/psl-fresh.dat > /tmp/rules-fresh.txt

          if diff -q /tmp/rules-current.txt /tmp/rules-fresh.txt > /dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No rule changes detected"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Rules changed:"
            { diff --unified=0 /tmp/rules-current.txt /tmp/rules-fresh.txt || true; } | head -30
          fi

      - name: Update data file
        if: steps.diff.outputs.changed == 'true'
        run: cp /tmp/psl-fresh.dat data/public_suffix_list.dat

      - uses: dtolnay/rust-toolchain@stable
        if: steps.diff.outputs.changed == 'true'
      - uses: Swatinem/rust-cache@v2
        if: steps.diff.outputs.changed == 'true'

      - name: Build trie + compress
        if: steps.diff.outputs.changed == 'true'
        run: python3 scripts/build-psl.py

      - name: Run tests
        if: steps.diff.outputs.changed == 'true'
        run: cargo test --all-features

      - name: Bump patch version
        if: steps.diff.outputs.changed == 'true'
        run: |
          VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          MAJOR=$(echo $VER | cut -d. -f1)
          MINOR=$(echo $VER | cut -d. -f2)
          PATCH=$(echo $VER | cut -d. -f3)
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          sed -i "s/^version = \"$VER\"/version = \"$NEW\"/" Cargo.toml

      - name: Update Cargo.lock
        if: steps.diff.outputs.changed == 'true'
        run: cargo update --workspace

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        id: pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          title: "chore(data): update PSL from publicsuffix.org"
          body: |
            Automated daily PSL data refresh.
            Source: https://publicsuffix.org/list/public_suffix_list.dat
          branch: chore/psl-update
          commit-message: "chore(data): update PSL from publicsuffix.org"
          delete-branch: true

      - name: Enable auto-merge
        if: steps.pr.outputs.pull-request-number
        run: gh pr merge --auto --squash "${{ steps.pr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
